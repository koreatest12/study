<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정보보안기사 학습 플랫폼</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">Information Security Engineer</p>
      <h1>정보보안기사 학습 플랫폼</h1>
      <p>과목별 개념 정리, 문제풀이, 정답 해설, 오답노트를 한 화면에서 학습합니다.</p>
      <div class="hero-actions">
        <button id="randomBtn">랜덤 문제 풀기</button>
        <button id="wrongNoteBtn" class="secondary">오답노트 보기</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="cards" aria-label="과목 카드">
      <button class="subject-card" data-subject="system">
        <span>01</span>
        <strong>시스템 보안</strong>
        <small>계정, 권한, 로그, 백업</small>
      </button>
      <button class="subject-card" data-subject="network">
        <span>02</span>
        <strong>네트워크 보안</strong>
        <small>TCP/IP, 포트, 방화벽, VPN</small>
      </button>
      <button class="subject-card" data-subject="application">
        <span>03</span>
        <strong>어플리케이션 보안</strong>
        <small>SQLi, XSS, CSRF, 세션</small>
      </button>
      <button class="subject-card" data-subject="general">
        <span>04</span>
        <strong>정보보안 일반</strong>
        <small>CIA, 암호, PKI, 접근통제</small>
      </button>
      <button class="subject-card" data-subject="management">
        <span>05</span>
        <strong>관리 및 법규</strong>
        <small>ISMS, 위험관리, 개인정보</small>
      </button>
    </section>

    <section class="quiz-panel">
      <div class="panel-header">
        <div>
          <p class="eyebrow">Quiz</p>
          <h2 id="quizTitle">문제를 선택하세요</h2>
        </div>
        <span id="scoreBadge">정답 0 / 풀이 0</span>
      </div>
      <article id="quizBox" class="quiz-box">
        <p>상단의 랜덤 문제 또는 과목 카드를 눌러 문제를 시작하세요.</p>
      </article>
    </section>

    <section class="wrong-note">
      <div class="panel-header">
        <div>
          <p class="eyebrow">Wrong Answer Note</p>
          <h2>오답노트</h2>
        </div>
        <button id="clearWrongBtn" class="secondary small">오답노트 초기화</button>
      </div>
      <div id="wrongList" class="wrong-list">아직 저장된 오답이 없습니다.</div>
    </section>
  </main>

  <footer>
    <p>정보보안기사 공부 자료 · GitHub 자동 생성 학습 플랫폼</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
