name: Auto Encoding Fixer (Always Run)

on:
  push:
    paths:
      - '**/*.md'
      - '**/*.txt'
  schedule:
    - cron: '0 0,12 * * *' # 매일 2회 정기 점검
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-encoding-always:
    runs-on: ubuntu-latest
    env:
      LANG: ko_KR.UTF-8
      LC_ALL: ko_KR.UTF-8

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run Encoding Fixer Script
        shell: python
        run: |
          import os
          import glob
          import unicodedata

          TARGET_DIRS = ['reports', '.'] 
          print("🔍 Starting Encoding & Normalization Check...")

          for directory in TARGET_DIRS:
              if not os.path.exists(directory):
                  continue
                  
              files = glob.glob(f'{directory}/**/*.md', recursive=True) + \
                      glob.glob(f'{directory}/**/*.txt', recursive=True)

              for filepath in files:
                  dirname, filename = os.path.split(filepath)
                  
                  # 1. 파일명 자소 분리(NFD) -> 정규화(NFC)
                  nfc_filename = unicodedata.normalize('NFC', filename)
                  
                  if filename != nfc_filename:
                      new_path = os.path.join(dirname, nfc_filename)
                      os.rename(filepath, new_path)
                      print(f"✅ Filename Normalized: {filename} -> {nfc_filename}")

                  # 2. 파일 내용 인코딩 변환 (CP949 -> UTF-8)
                  try:
                      with open(filepath, 'r', encoding='utf-8') as f:
                          f.read()
                  except UnicodeDecodeError:
                      try:
                          print(f"⚠️ Non-UTF-8 detected: {filepath}")
                          with open(filepath, 'r', encoding='cp949') as f:
                              content = f.read()
                          with open(filepath, 'w', encoding='utf-8') as f:
                              f.write(content)
                          print(f"✅ Converted to UTF-8: {filepath}")
                      except Exception as e:
                          print(f"❌ Error converting {filepath}: {e}")

          print("✨ Encoding check completed.")

      - name: Commit and Push Changes (Always Execute)
        run: |
          git config --global user.name "encoding-guard-bot"
          git config --global user.email "guard@noreply.github.com"
          git add .
          echo "🔍 Checking for changes to commit..."
          if git diff --staged --quiet; then
            echo "✅ No changes detected. (Clean)"
            echo "Skip pushing to avoid empty commit error."
          else
            echo "🚀 Changes detected! Committing and Pushing..."
            git commit -m "🚑 Auto-fix: Normalize filenames and convert to UTF-8"
            git push
            echo "🎉 Successfully pushed changes."
          fi
